services:
  mysql:
    image: mysql:8.0
    container_name: flashdeal-mysql
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5

  mysql-exporter:
    image: prom/mysqld-exporter:latest
    container_name: flashdeal-mysql-exporter
    ports:
      - "9104:9104"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    volumes:
      - ./docker/mysql-exporter/.my.cnf:/.my.cnf.tmpl
    entrypoint:
      - sh
      - -c
      - |
        sed "s/MYSQL_PASSWORD_PLACEHOLDER/$$MYSQL_ROOT_PASSWORD/" /.my.cnf.tmpl > /tmp/.my.cnf
        exec /bin/mysqld_exporter --config.my-cnf=/tmp/.my.cnf
    depends_on:
      mysql:
        condition: service_healthy

  prometheus:
    image: prom/prometheus:latest
    container_name: flashdeal-prometheus
    ports:
      - "9091:9090"
    environment:
      SPRING_HOST: ${SPRING_HOST}
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml.tmpl
    entrypoint:
      - sh
      - -c
      - |
        sed "s/SPRING_HOST_PLACEHOLDER/$$SPRING_HOST/" /etc/prometheus/prometheus.yml.tmpl > /tmp/prometheus.yml
        exec /bin/prometheus --config.file=/tmp/prometheus.yml --storage.tsdb.path=/prometheus

  redis:
    image: redis:7.2-alpine
    container_name: flashdeal-redis
    ports:
      - "6379:6379"
    command: >
      redis-server
      --save ""
      --appendonly yes
      --appendfsync everysec
      --no-appendfsync-on-rewrite yes
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  grafana:
    image: grafana/grafana:latest
    container_name: flashdeal-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
    volumes:
      - grafana-data:/var/lib/grafana
      - ./docker/grafana/provisioning:/etc/grafana/provisioning
    depends_on:
      - prometheus

  kafka:
    image: confluentinc/cp-kafka:7.7.0
    container_name: flashdeal-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

volumes:
  mysql-data:
  grafana-data:
  redis-data:
